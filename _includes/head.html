{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<!-- 모바일 아이콘 -->
<link rel="apple-touch-icon" sizes="192x192" href="/images/favicon-192x192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/images/favicon-512x512.png">
<link rel="manifest" href="/manifest.json">
